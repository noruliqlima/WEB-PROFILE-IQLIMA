<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com/3.4.16" onload="tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Poppins','ui-sans-serif','system-ui','sans-serif']}}}}"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: 'Poppins', ui-sans-serif, system-ui, sans-serif; }
  #dc-root, .dc-mount { height: 100%; }

  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* Entrance animation must NEVER leave content hidden if the animation
     timeline is frozen (e.g. during offline-bundle splash unpack). Opacity
     stays 1 by default; we animate transform only as a safe enhancement. */
  .fade-up { opacity: 1; animation: fadeUpSafe 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes fadeUpSafe {
    from { transform: translateY(12px); }
    to { transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) { .fade-up { animation: none; } }

  @keyframes aurora-1 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(14vw, -10vh) scale(1.3); }
    50%  { transform: translate(-8vw, 12vh) scale(0.92); }
    75%  { transform: translate(10vw, 6vh) scale(1.18); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes aurora-2 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(-16vw, 8vh) scale(1.25); }
    50%  { transform: translate(10vw, -12vh) scale(0.9); }
    75%  { transform: translate(-6vw, -6vh) scale(1.2); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes aurora-3 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(10vw, 12vh) scale(0.95); }
    50%  { transform: translate(-12vw, -8vh) scale(1.3); }
    75%  { transform: translate(8vw, -10vh) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes aurora-4 {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(-12vw, -12vh) scale(1.28); }
    50%  { transform: translate(12vw, 10vh) scale(0.9); }
    75%  { transform: translate(-8vw, 8vh) scale(1.15); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes aurora-5 {
    0%   { transform: translate(-50%, -50%) scale(1); }
    50%  { transform: translate(-50%, -50%) scale(1.4); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes aurora-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes aurora-hue {
    0%, 100% { filter: hue-rotate(0deg); }
    50%      { filter: hue-rotate(28deg); }
  }
  .animate-aurora-1 { animation: aurora-1 26s ease-in-out infinite; }
  .animate-aurora-2 { animation: aurora-2 32s ease-in-out infinite; }
  .animate-aurora-3 { animation: aurora-3 29s ease-in-out infinite; }
  .animate-aurora-4 { animation: aurora-4 35s ease-in-out infinite; }
  .animate-aurora-5 { animation: aurora-5 22s ease-in-out infinite; }
  .aurora-wrap { animation: aurora-hue 16s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .animate-aurora-1, .animate-aurora-2, .animate-aurora-3, .animate-aurora-4, .animate-aurora-5, .aurora-wrap { animation: none; }
  }
</style>
</helmet>
<x-import component-from-global-scope="IqlimaApp" from="./app.jsx" hint-size="100%,100%"></x-import>
<template id="__bundler_thumbnail" data-bg-color="#eaf2ff">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#38bdf8"/>
        <stop offset="1" stop-color="#a78bfa"/>
      </linearGradient>
    </defs>
    <rect width="1200" height="800" fill="#eaf2ff"/>
    <circle cx="600" cy="300" r="120" fill="url(#g)"/>
    <circle cx="600" cy="300" r="120" fill="none" stroke="#fff" stroke-width="14"/>
    <rect x="450" y="470" width="300" height="34" rx="17" fill="#1e3a8a"/>
    <rect x="510" y="528" width="180" height="20" rx="10" fill="#60a5fa"/>
    <rect x="430" y="600" width="340" height="60" rx="22" fill="url(#g)"/>
  </svg>
</template>
</x-dc>
</body>
</html>
